<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/trailfinder-icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trek Research App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --forest: #1a2e1a; --moss: #2d4a2d; --fern: #3d6b3d; --sage: #6b9e6b;
      --mist: #c8dfc8; --fog: #e8f0e8; --white: #f5f7f5; --bark: #8b6f47;
      --stone: #9e9e8e; --ink: #1a1f1a; --ink2: #3d4a3d; --ink3: #6b7a6b;
      --danger: #b54a3a; --success: #3d7a4a; --warn: #c47c2a;
      --border: rgba(45,74,45,0.15); --border2: rgba(45,74,45,0.25);
      --shadow: 0 1px 3px rgba(26,46,26,0.08), 0 4px 16px rgba(26,46,26,0.04);
      --shadow-lg: 0 4px 24px rgba(26,46,26,0.12);
    }
    body { font-family: 'Sarabun', sans-serif; background: var(--white); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
